<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Whist card game — play online or offline against bots" />
  <title>Whist</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
</head>
<body>
  <div id="app">

    <!-- ═══ Stage: LOBBY ═══ -->
    <section id="stage-lobby" class="stage active flex-col items-center justify-center">
    </section>

    <!-- ═══ Stage: DEALING ═══ -->
    <section id="stage-dealing" class="stage items-center justify-center">
    </section>

    <!-- ═══ Stage: BETTING ═══ -->
    <section id="stage-betting" class="stage flex-col">
    </section>

    <!-- ═══ Stage: PLAYING ═══ -->
    <section id="stage-playing" class="stage flex-col">
    </section>

    <!-- ═══ Stage: ROUND_END ═══ -->
    <section id="stage-round-end" class="stage items-center justify-center">
    </section>

    <!-- ═══ Stage: GAME_OVER ═══ -->
    <section id="stage-game-over" class="stage items-center justify-center flex-col">
    </section>

    <!-- ═══ Persistent HUD (visible during gameplay stages) ═══ -->
    <div id="hud" class="absolute inset-0 pointer-events-none" style="display: none;">
    </div>

  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
