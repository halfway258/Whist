<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Whist card game — play online or offline against bots" />
  <title>Whist</title>
  <link rel="icon" type="image/svg+xml" href="./favicon.svg" />

  <link rel="stylesheet" crossorigin href="./assets/index-OBI-yw0K.css">
</head>
<body>
  <div id="app">

    <!-- ═══ Stage: LOBBY ═══ -->
    <section id="stage-lobby" class="stage active flex-col items-center justify-center">
    </section>

    <!-- ═══ Stage: DEALING ═══ -->
    <section id="stage-dealing" class="stage items-center justify-center">
    </section>

    <!-- ═══ Stage: BETTING ═══ -->
    <section id="stage-betting" class="stage flex-col">
    </section>

    <!-- ═══ Stage: PLAYING ═══ -->
    <section id="stage-playing" class="stage flex-col">

    <!-- ═══ Stage: ROUND_END ═══ -->
    <section id="stage-round-end" class="stage items-center justify-center">
    </section>

    <!-- ═══ Stage: GAME_OVER ═══ -->
    <section id="stage-game-over" class="stage items-center justify-center flex-col">

    <!-- ═══ Persistent HUD (visible during gameplay stages) ═══ -->
    <div id="hud" class="absolute inset-0 pointer-events-none" style="display: none;">
    </div>

  </div>

  <!-- Global Loading Overlay -->
  <div id="loading-overlay" class="loading-overlay">
    <div class="flex flex-col items-center gap-4">
      <!-- Spinner -->
      <div class="w-12 h-12 border-4 border-emerald-500/20 border-t-emerald-500 rounded-full animate-spin"></div>
      <div id="loading-text" class="text-sm font-black text-slate-200 uppercase tracking-widest">Loading...</div>
    </div>
  </div>
